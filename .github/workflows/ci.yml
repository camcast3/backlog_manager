name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: backlog_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/backlog_manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run migrations
        run: cd backend && node src/db/migrate.js

      - name: Run tests
        run: cd backend && node --experimental-vm-modules ./node_modules/jest/bin/jest.js --forceExit

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Run tests
        run: cd frontend && npx vitest run

      - name: Build
        run: cd frontend && npx vite build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: backlog_manager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/backlog_manager

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run migrations
        run: cd backend && node src/db/migrate.js

      - name: Start backend
        run: cd backend && node src/server.js &

      - name: Start frontend
        run: cd frontend && npx vite --host &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3001/health --timeout 30000
          npx wait-on http://localhost:5173 --timeout 30000

      - name: Seed test data
        run: node -e "import('./e2e/global-setup.mjs').then(m => m.default())"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
